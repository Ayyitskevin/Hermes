<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050509" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'none'; img-src 'self' data:; font-src 'self' data:; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>Hermes Journal</title>
  </head>
  <body>
    <div id="app" data-startup-state="opening" aria-busy="true">
      <main class="startup-screen" data-startup-view="opening" aria-labelledby="startup-title">
        <section class="card startup-card">
          <p class="eyebrow">PRIVATE LOCAL JOURNAL</p>
          <h1 id="startup-title">Opening Hermes Journal</h1>
          <p id="startup-status" class="startup-status" role="status" aria-live="polite" aria-atomic="true">Checking local journal storage and journal integrity.</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
