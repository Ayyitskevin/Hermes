# Hermes configuration — copy to config/hermes.toml and adjust.
# No secrets in this file (those live in .env), and no dollar figures anywhere:
# every risk number is a percentage of account equity.

[market]
# Symbols Hermes watches daily. The benchmark is used for regime input,
# breadth context, and journal alpha resolution.
#
# A DIVERSIFIED CROSS-SECTOR field on purpose: the RS board and screener can
# only surface leadership across the market if they can see across it. Feed
# them the whole field — all 11 sector ETFs plus liquid leaders from each —
# and let them rank leaders and flag laggards (SKIP-LAG), rather than betting a
# narrow, correlated cluster. (Watchlist composition is a breadth convention,
# not a claim of edge — see METHODOLOGY.md; edge lives on the chart, not here.)
benchmark = "SPY"
watchlist = [
    "SPY", "QQQ", "IWM",
    "XLK", "XLC", "XLY", "XLV", "XLF", "XLI", "XLE", "XLB", "XLP", "XLU", "XLRE",
    "NVDA", "MSFT", "AAPL", "META", "GOOGL", "NFLX", "AMZN", "HD", "COST",
    "JPM", "GS", "V", "LLY", "UNH", "CVX", "XOM", "CAT", "GE",
]
# RESERVED: V1 workflows hardcode 1Day bars; this knob is currently read by
# nothing (the V2+ roadmap covers 4H/weekly). Hermes deliberately does not
# consume tick data at any point.
timeframes = ["1Day"]
# Data older than this many minutes during market hours is shown as STALE,
# never silently served as if live.
stale_after_minutes = 30

[data]
# "alpaca"  — recommended for real data (this example selects it); free
#             real-time-enough IEX feed, requires keys in .env
# "databento" — fallback; requires DATABENTO_API_KEY in .env
# "sample" — bundled offline sample data; runs with zero keys (demo / tests).
#            NOTE: sample is the BUILT-IN default when no config file exists.
provider = "alpaca"

[regime]
# "v62" — Regime Label v6.2, the owner's classifier, ported from its
#     TradingView source (Daily preset; see docs/REGIME_V62_PORT.md for
#     fidelity notes). The default.
# "reference-v1" — a transparent composite of named, published methods
#     (see docs/METHODOLOGY.md); useful as a second opinion.
classifier = "v62"
# Lookback (trading days) for the volatility percentile component.
vol_percentile_lookback = 252

[risk]
# All limits are % of account equity. Hermes never knows a dollar amount.
max_risk_per_trade_pct = 1.0        # planned loss if a stop is hit
max_open_risk_pct = 4.0             # sum of planned risk across open positions
max_position_size_pct = 20.0        # single-position exposure ceiling
max_sector_exposure_pct = 30.0      # per-sector exposure ceiling
max_drawdown_pct = 10.0             # equity-index drawdown that trips the circuit breaker
correlation_warn_threshold = 0.70   # pairwise 60-day return correlation between open positions
correlation_lookback_days = 60

[journal]
# Trades still open after this many calendar days get a "stale thesis" nudge.
stale_open_after_days = 45

[ai]
# Local-first: routine narrative work goes to your own Ollama.
ollama_url = "http://127.0.0.1:11434"
ollama_model = "llama3.1"
# Cloud is the DELIBERATE EXCEPTION, off by default. When allow_cloud = true the
# router (src/hermes/ai/router.py) still routes local-first and only reaches for
# Claude when a task opts in or you pick it in the UI; if a backend is down it
# falls back to the other and labels which answered; if both are down it degrades
# visibly ("model unavailable") while every computed number still renders.
# Requires ANTHROPIC_API_KEY in .env. Never sees or emits an order.
allow_cloud = false
cloud_model = "claude-sonnet-5"        # default cloud model
cloud_fast_model = "claude-haiku-4-5"  # fast lane for cheap / interactive turns

[schedule]
# Times are America/New_York (US market clock). Cron format: "MIN HOUR"
# (defaults to Mon–Fri) or "MIN HOUR DOW", where DOW is an APScheduler
# day_of_week string ("sun", "mon-fri", "mon,wed,fri").
timezone = "America/New_York"
premarket_check = "0 8"      # daily market check: fetch, classify regime, risk sweep, report
eod_sync = "30 16"           # end-of-day bar sync after the close
journal_resolve = "0 17"     # count open/stale entries awaiting human resolution
weekly_review = "0 18 sun"   # Sunday portfolio review: coherence, sector heat, correlation, exposure
backup = "0 2 mon-sun"       # nightly DB snapshot (every day, incl. weekends)

[backup]
# Nightly snapshots of data/hermes.db (SQLite online backup — safe while
# running). Restore: stop the service, copy a snapshot over data/hermes.db.
# Drill without overwrite: `hermes restore-drill` (or GET /api/ops/restore-drill).
retention = 14               # snapshots to keep; older are pruned
subdir = "backups"           # snapshot directory, relative to the data dir

# Paper broker READ-ONLY position sync (Phase 6). Off by default.
# When enabled, Hermes may GET positions from the paper trading host via the
# sealed src/hermes/broker_ro/ package only — never orders. Positions are
# converted to % of equity immediately; dollar balances are never stored.
# Requires APCA_API_KEY_ID / APCA_API_SECRET_KEY in .env. Run: hermes book-sync
# or POST /api/book/sync. The boundary guard must stay green.
[broker_ro]
enabled = false
feed_risk = true             # merge RO cache into risk.evaluate when enabled

[server]
host = "127.0.0.1"
port = 8642
