name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Legacy Python safety gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests (includes the no-order-paths guard)
        run: pytest -v

  mobile:
    name: Mobile Linux contract gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install locked mobile dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Enforce the mobile no-network and no-order boundary
        run: npm run test:boundary
      - name: Unit tests
        run: npm test
      - name: Unit-test the iOS sync evidence verifier
        run: npm run test:ios-sync
      - name: Install mobile browser
        run: npx playwright install --with-deps chromium
      - name: Build and run mobile UI smoke
        run: npm run test:e2e
      - name: Build and copy the bundle into the iOS shell (Linux; no native build)
        run: npm run ios:copy
      - name: Verify and report the Linux-to-Mac iOS handoff
        run: npm run verify:ios-sync
      - name: Audit production dependencies
        run: npm audit --omit=dev
