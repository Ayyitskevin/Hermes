<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#05060a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icons/hermes-192.png">
  <title>Hermes — terminal</title>
  <link rel="stylesheet" href="/static/css/hermes.css">
</head>
<body>
  <a class="skip" href="#view">Skip to content</a>

  <!-- Persistent shell: chrome (brand, nav, model selector, tape) + the global
       Limit Rail, which is dominant on every surface and floods on breach. -->
  <header class="chrome" id="chrome"></header>
  <div class="tape" id="tape" aria-label="Live ticker tape"></div>
  <header class="riskrail" id="rail" aria-label="Risk state — outranks everything below"></header>

  <main id="view"></main>
  <footer class="edgeprint" id="edgeprint"></footer>

  <script type="module" src="/static/js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
